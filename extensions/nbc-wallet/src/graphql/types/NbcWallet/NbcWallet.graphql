type NbcWallet {
  walletId: Int!
  uuid: String!
  customerId: Int!
  walletAddress: String!
  depositAddress: String
  addressIndex: Int
  chainId: Int
  balance: Float!
  frozenBalance: Float!
  availableBalance: Float!
  currency: String!
  status: Int!
  exchangeRate: Float!
  cnyValue: Float!
  availableCnyValue: Float!
  lastLoginAt: DateTime
  createdAt: DateTime
  updatedAt: DateTime
}

type NbcWalletTransaction {
  walletTxId: Int!
  uuid: String!
  walletId: Int!
  orderId: Int
  orderUuid: String
  orderNumber: String
  transactionType: String!
  amount: Float!
  balanceBefore: Float!
  balanceAfter: Float!
  exchangeRate: Float
  cnyAmount: Float
  reference: String
  status: String!
  metadata: JSON
  createdAt: DateTime
}

type NbcWalletTransactionCollection {
  items: [NbcWalletTransaction]
  currentPage: Int!
  pageSize: Int!
  total: Int!
}

type NbcWalletWithdrawal {
  withdrawalId: Int!
  uuid: String!
  walletId: Int!
  customerId: Int!
  walletAddress: String!
  chainId: Int!
  tokenAddress: String!
  amount: Float!
  txHash: String
  walletTxId: Int
  status: String!
  requestedAt: DateTime
  processedAt: DateTime
  failedAt: DateTime
  errorMessage: String
  metadata: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type NbcOrderUsage {
  walletTxId: Int
  transactionUuid: String
  nbcAmount: Float!
  exchangeRate: Float!
  cnyAmount: Float!
  balanceBefore: Float
  balanceAfter: Float
  transactionStatus: String
  paidAt: DateTime
  transaction: NbcWalletTransaction
  wallet: NbcWallet
}

extend type Customer {
  nbcWallet: NbcWallet
  nbcWalletTransactions(page: Int, limit: Int, transactionType: String): NbcWalletTransactionCollection
  nbcWalletWithdrawals(limit: Int): [NbcWalletWithdrawal]
}

extend type Order {
  nbcUsage: NbcOrderUsage
}

type NbcWalletPublicConfig {
  exchangeRate: Float!
  shopCurrency: String!
  displayName: String!
  chainId: Int
  rpcUrl: String
  chainName: String
  nativeSymbol: String
  assetType: String!
  tokenAddress: String
  tokenDecimals: Int
  blockExplorerUrl: String
  chainBalanceEnabled: Boolean!
  treasuryAddress: String
  depositMode: String!
  onchainEnabled: Boolean!
  onchainEnabledRaw: Int!
}

extend type Query {
  nbcWallet: NbcWallet
  nbcWalletTransactions(page: Int, limit: Int, transactionType: String): NbcWalletTransactionCollection
  nbcWalletWithdrawals(limit: Int): [NbcWalletWithdrawal]
  nbcWalletPublicConfig: NbcWalletPublicConfig!
}
